<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background — solid dark, no gradients (librsvg drops them) -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle decorative grid -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0"   y1="0"   x2="0"   y2="630"/>
    <line x1="240" y1="0"   x2="240" y2="630"/>
    <line x1="480" y1="0"   x2="480" y2="630"/>
    <line x1="720" y1="0"   x2="720" y2="630"/>
    <line x1="960" y1="0"   x2="960" y2="630"/>
    <line x1="1200" y1="0"  x2="1200" y2="630"/>
  </g>

  <!-- Decorative orange ring at top-right corner for brand color -->
  <circle cx="1100" cy="80" r="200" fill="#ff6600" opacity="0.06"/>
  <circle cx="100"  cy="550" r="180" fill="#ff6600" opacity="0.04"/>

  <!-- ─── Logo (left side, vertically centered) ─── -->
  <g transform="translate(110, 187)">
    <circle cx="128" cy="128" r="128" fill="#ff6600"/>
    <path d="M63.5 178.2V105.7l64.5 64.5 64.5-64.5v72.5h29.8v-99.9c0-6.7-5.4-12.1-12.1-12.1-3.2 0-6.3 1.3-8.6 3.5L128 143.3 54.4 69.7c-2.3-2.3-5.3-3.5-8.6-3.5-6.7 0-12.1 5.4-12.1 12.1v99.9h29.8z" fill="#fff"/>
  </g>

  <!-- ─── Right side text block (centered vertically around 315) ─── -->

  <!-- Eyebrow tag — short on purpose -->
  <text x="430" y="195" font-family="DejaVu Sans, sans-serif" font-size="22"
        font-weight="700" fill="#ff6600" letter-spacing="2">NON-CUSTODIAL · OPEN SOURCE</text>

  <!-- Title: "monero" + "web" — two text elements so we can color them differently -->
  <text x="430" y="295" font-family="DejaVu Sans, sans-serif" font-size="80"
        font-weight="900" fill="#eae8e4">monero</text>
  <text x="700" y="295" font-family="DejaVu Sans, sans-serif" font-size="80"
        font-weight="900" fill="#ff6600">web</text>

  <!-- Tagline -->
  <text x="430" y="345" font-family="DejaVu Sans, sans-serif" font-size="26"
        font-weight="500" fill="#9a9894">The Monero wallet that lives in your browser</text>

  <!-- Format pills row -->
  <g transform="translate(430, 395)">
    <g>
      <rect x="0" y="0" width="125" height="42" rx="21" fill="#19191d" stroke="#262630"/>
      <text x="62" y="28" font-family="DejaVu Sans Mono, monospace" font-size="16"
            font-weight="600" fill="#eae8e4" text-anchor="middle">12 BIP-39</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="135" height="42" rx="21" fill="#19191d" stroke="#262630"/>
      <text x="67" y="28" font-family="DejaVu Sans Mono, monospace" font-size="16"
            font-weight="600" fill="#eae8e4" text-anchor="middle">13 MyMonero</text>
    </g>
    <g transform="translate(290, 0)">
      <rect x="0" y="0" width="125" height="42" rx="21" fill="#19191d" stroke="#262630"/>
      <text x="62" y="28" font-family="DejaVu Sans Mono, monospace" font-size="16"
            font-weight="600" fill="#eae8e4" text-anchor="middle">16 Polyseed</text>
    </g>
    <g transform="translate(430, 0)">
      <rect x="0" y="0" width="135" height="42" rx="21" fill="#2b1500" stroke="#5a2c00"/>
      <text x="67" y="28" font-family="DejaVu Sans Mono, monospace" font-size="16"
            font-weight="600" fill="#ff9a3c" text-anchor="middle">25 Standard</text>
    </g>
  </g>

  <!-- Footer line — kept short -->
  <text x="430" y="500" font-family="DejaVu Sans, sans-serif" font-size="20"
        font-weight="500" fill="#6e6c6a">monero-web.com</text>
  <text x="610" y="500" font-family="DejaVu Sans, sans-serif" font-size="20"
        font-weight="500" fill="#6e6c6a">·  zero downloads  ·  zero trackers  ·  MIT</text>
</svg>
